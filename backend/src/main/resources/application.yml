spring:
  profiles:
    active: dev
  application:
    name: ai-email-generator

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: alpha

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:dGhpcy1pcy1hLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLXBsZWFzZS1jaGFuZ2UtaXQtaW4tcHJvZHVjdGlvbg==}
    expiration-ms: ${JWT_EXPIRATION:86400000}
  groq:
    api-key: ${GROQ_API_KEY:}
    model: llama-3.1-8b-instant
    api-url: https://api.groq.com/openai/v1/chat/completions
